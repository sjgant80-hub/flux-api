openapi: 3.0.3
info:
  title: Flux
  version: 1.0.0
  description: |
    Flux turns a one-line brief into production-ready content across 7 formats — blog, social, email, ads, product, landing, thread. Provider-agnostic (Anthropic, OpenAI, Google). Every response ships structured JSON with content, metadata, and SEO suggestions where applicable.

servers:
  - url: https://flux-api-da50.onrender.com

paths:

  /health:
    get:
      operationId: health
      summary: Service health
      description: Returns status, version, and configured LLM providers.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              example:
                status: ok
                version: "1.0.0"
                providers: [anthropic]
              schema:
                type: object

  /v1/types:
    get:
      operationId: listTypes
      summary: List all content types
      description: Returns the 7 supported content generators with their endpoints and descriptions.
      responses:
        '200':
          description: List of generators
          content:
            application/json:
              example:
                generators:
                  - { type: "blog",    endpoint: "/v1/generate/blog",    description: "SEO-optimized blog posts" }
                  - { type: "social",  endpoint: "/v1/generate/social",  description: "Platform-ready social posts" }
                  - { type: "email",   endpoint: "/v1/generate/email",   description: "Email campaigns with subject lines" }
                  - { type: "ads",     endpoint: "/v1/generate/ads",     description: "Ad copy variants" }
                  - { type: "product", endpoint: "/v1/generate/product", description: "Conversion-optimized product copy" }
                  - { type: "landing", endpoint: "/v1/generate/landing", description: "Landing page copy" }
                  - { type: "thread",  endpoint: "/v1/generate/thread",  description: "Twitter/X multi-post threads" }
              schema:
                type: object

  /v1/generate/{type}:
    post:
      operationId: generateContent
      summary: Generate content by type
      description: Generate one of 7 content types — blog, social, email, ads, product, landing, thread.
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [blog, social, email, ads, product, landing, thread]
      requestBody:
        required: true
        content:
          application/json:
            example:
              brief: "Write about the benefits of remote work for startups"
              tone: "professional"
              audience: "early-stage founders"
              keywords: ["remote work", "startups", "productivity"]
              variants: 1
            schema:
              type: object
              required: [brief]
              properties:
                brief:    { type: string }
                tone:     { type: string }
                audience: { type: string }
                keywords:
                  type: array
                  items: { type: string }
                variants: { type: integer }
      responses:
        '200':
          description: Generated content with metadata
          content:
            application/json:
              example:
                type: "blog"
                content: "Generated blog post text..."
                meta:
                  word_count: 850
                  reading_time_min: 4
                  keywords_used: ["remote work", "startups"]
                seo:
                  meta_description: "..."
                  suggested_h1: "..."
              schema:
                type: object

  /v1/repurpose:
    post:
      operationId: repurpose
      summary: Repurpose one piece of content into multiple formats
      description: Take a piece of content in one format and convert it into others (blog → social + email + thread).
      requestBody:
        required: true
        content:
          application/json:
            example:
              content: "Long-form blog content here..."
              from: "blog"
              to: ["social", "thread"]
            schema:
              type: object
              required: [content, from, to]
              properties:
                content: { type: string }
                from:    { type: string }
                to:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Repurposed content
          content:
            application/json:
              example:
                source_format: "blog"
                outputs:
                  social: "..."
                  thread: ["...", "...", "..."]
              schema:
                type: object

  /v1/improve:
    post:
      operationId: improve
      summary: Enhance existing content
      description: Improve clarity, SEO, engagement, or conversion of existing content.
      requestBody:
        required: true
        content:
          application/json:
            example:
              text: "Original text to improve"
              tone: "professional"
              goal: "clarity"
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
                tone: { type: string }
                goal: { type: string }
      responses:
        '200':
          description: Improved content
          content:
            application/json:
              example:
                original: "..."
                improved: "..."
                changes: ["tightened opening", "added concrete examples"]
              schema:
                type: object

  /v1/seo:
    post:
      operationId: seo
      summary: SEO research and meta generation
      description: Generate keywords, meta descriptions, title variants, and content structure for a topic.
      requestBody:
        required: true
        content:
          application/json:
            example:
              topic: "remote work software"
              audience: "small business owners"
            schema:
              type: object
              required: [topic]
              properties:
                topic:    { type: string }
                audience: { type: string }
      responses:
        '200':
          description: SEO data
          content:
            application/json:
              example:
                keywords:
                  primary: ["remote work software"]
                  secondary: ["remote tools", "team collaboration"]
                title_variants: ["...", "...", "..."]
                meta_description: "..."
              schema:
                type: object

  /v1/brand-voice:
    post:
      operationId: brandVoice
      summary: Extract a brand voice profile from samples
      description: Provide writing samples and get a reusable voice profile for consistent output across content types.
      requestBody:
        required: true
        content:
          application/json:
            example:
              samples:
                - "First piece of brand copy"
                - "Second piece showing tone"
            schema:
              type: object
              required: [samples]
              properties:
                samples:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Voice profile
          content:
            application/json:
              example:
                voice_profile:
                  tone: "direct, peer-to-peer, no jargon"
                  pacing: "short sentences, occasional fragment for emphasis"
                  forbidden_phrases: ["delve into", "leverage"]
                  signature_moves: ["one specific observation", "one specific question"]
              schema:
                type: object
